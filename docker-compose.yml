services:
  postgres:
    image: postgres:16-alpine
    container_name: quickplay_postgres
    environment:
      POSTGRES_DB: quickplaybot
      POSTGRES_USER: quickplay
      POSTGRES_PASSWORD: quickplay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickplay -d quickplaybot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quickplay_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickplay_bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quickplay:quickplay@postgres:5432/quickplaybot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python main.py"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
